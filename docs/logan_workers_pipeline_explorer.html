<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LogAn Workers Pipeline Explorer</title>
  <style>
    :root {
      --bg: #06101d;
      --bg-2: #091827;
      --panel: rgba(12, 28, 45, 0.88);
      --panel-strong: rgba(13, 32, 52, 0.98);
      --line: rgba(148, 163, 184, 0.18);
      --line-strong: rgba(94, 234, 212, 0.34);
      --text: #e8f0fb;
      --muted: #94a9c2;
      --cyan: #2dd4bf;
      --cyan-2: #22d3ee;
      --purple: #a78bfa;
      --blue: #60a5fa;
      --amber: #fbbf24;
      --orange: #fb923c;
      --red: #fb7185;
      --green: #4ade80;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
      --radius: 18px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 18% -5%, rgba(45, 212, 191, 0.15), transparent 30%),
        radial-gradient(circle at 95% 15%, rgba(167, 139, 250, 0.14), transparent 28%),
        linear-gradient(145deg, #050c16 0%, var(--bg) 42%, #071524 100%);
      font-family: var(--sans);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.22;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: linear-gradient(to bottom, black, transparent 92%);
    }

    button, select { font: inherit; }

    .app {
      width: min(1920px, 100%);
      margin: 0 auto;
      padding: 22px;
      position: relative;
      z-index: 1;
    }

    .glass {
      background: linear-gradient(145deg, rgba(16, 35, 56, .92), rgba(8, 22, 37, .84));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      border-radius: 24px;
      padding: 22px 24px;
      overflow: hidden;
      position: relative;
    }

    .topbar::after {
      content: "";
      position: absolute;
      width: 380px;
      height: 380px;
      right: -140px;
      top: -210px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(45,212,191,.22), transparent 64%);
      pointer-events: none;
    }

    .eyebrow {
      color: var(--cyan);
      text-transform: uppercase;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .16em;
    }

    h1 {
      margin: 7px 0 8px;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.02;
      letter-spacing: -.04em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      max-width: 920px;
      line-height: 1.65;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      position: relative;
      z-index: 1;
    }

    .btn, .select {
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(10, 26, 43, .88);
      border-radius: 12px;
      padding: 10px 13px;
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }

    .btn:hover, .select:hover {
      transform: translateY(-1px);
      border-color: rgba(94,234,212,.45);
      background: rgba(18, 45, 69, .92);
    }

    .btn.primary {
      color: #041014;
      border-color: transparent;
      font-weight: 900;
      background: linear-gradient(135deg, var(--cyan), var(--cyan-2));
      box-shadow: 0 12px 30px rgba(45,212,191,.22);
    }

    .btn.danger { color: #ffe3e8; border-color: rgba(251,113,133,.34); }

    .dataset-note {
      margin-top: 12px;
      padding: 10px 13px;
      border-radius: 12px;
      color: #b8c8d9;
      background: rgba(59,130,246,.08);
      border: 1px solid rgba(96,165,250,.18);
      font-size: 12px;
      line-height: 1.55;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 12px;
      margin: 16px 0;
    }

    .metric {
      border-radius: 16px;
      padding: 15px 16px;
      border: 1px solid var(--line);
      background: rgba(9, 24, 39, .72);
      position: relative;
      overflow: hidden;
    }

    .metric::after {
      content: "";
      position: absolute;
      width: 70px;
      height: 70px;
      right: -22px;
      bottom: -28px;
      border-radius: 50%;
      background: var(--metric-color, var(--cyan));
      opacity: .13;
    }

    .metric-label { color: var(--muted); font-size: 12px; }
    .metric-value { font-size: 26px; font-weight: 900; margin-top: 3px; }
    .metric-help { color: #6f89a4; font-size: 11px; margin-top: 2px; }

    .workspace {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 370px;
      gap: 15px;
      align-items: stretch;
    }

    .rail, .inspector, .stage-shell {
      border-radius: var(--radius);
      min-height: 780px;
    }

    .rail {
      padding: 18px 14px;
      position: sticky;
      top: 14px;
      height: calc(100vh - 28px);
      min-height: 760px;
      overflow-y: auto;
    }

    .rail-head {
      padding: 0 7px 12px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 12px;
    }

    .rail-head strong { display: block; font-size: 15px; }
    .rail-head span { color: var(--muted); font-size: 12px; }

    .step-list { position: relative; padding: 6px 0; }

    .step-list::before {
      content: "";
      position: absolute;
      left: 28px;
      top: 24px;
      bottom: 24px;
      width: 2px;
      background: linear-gradient(to bottom, rgba(45,212,191,.48), rgba(167,139,250,.22), rgba(148,163,184,.08));
    }

    .flow-orb {
      position: absolute;
      left: 21px;
      top: 19px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff, var(--cyan) 38%, #0f766e 72%);
      box-shadow: 0 0 0 5px rgba(45,212,191,.12), 0 0 28px rgba(45,212,191,.72);
      z-index: 3;
      transition: transform .55s cubic-bezier(.2,.8,.2,1);
      animation: orbPulse 1.5s ease-in-out infinite;
    }

    @keyframes orbPulse {
      50% { box-shadow: 0 0 0 9px rgba(45,212,191,.05), 0 0 36px rgba(45,212,191,.78); }
    }

    .step-btn {
      width: 100%;
      border: 0;
      color: var(--text);
      background: transparent;
      cursor: pointer;
      display: grid;
      grid-template-columns: 42px minmax(0,1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 9px 8px;
      border-radius: 13px;
      text-align: left;
      position: relative;
      z-index: 2;
      margin: 2px 0;
      transition: background .18s ease, transform .18s ease;
    }

    .step-btn:hover { background: rgba(45,212,191,.07); transform: translateX(2px); }
    .step-btn.active { background: linear-gradient(90deg, rgba(45,212,191,.16), rgba(96,165,250,.06)); }
    .step-btn.done .step-index { background: rgba(74,222,128,.14); color: var(--green); border-color: rgba(74,222,128,.35); }

    .step-index {
      width: 31px;
      height: 31px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 900;
      color: var(--muted);
      background: #0a1828;
      border: 1px solid var(--line);
    }

    .step-btn.active .step-index {
      color: #031312;
      background: var(--cyan);
      border-color: transparent;
      box-shadow: 0 0 22px rgba(45,212,191,.35);
    }

    .step-name { font-size: 13px; font-weight: 800; }
    .step-file { color: #728aa4; font-size: 10px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .step-state { color: var(--muted); font-size: 11px; }
    .step-btn.active .step-state { color: var(--cyan); }

    .llm-tag {
      display: inline-block;
      margin-left: 6px;
      padding: 2px 5px;
      border-radius: 6px;
      font-size: 8.5px;
      font-weight: 900;
      letter-spacing: .05em;
      color: #041014;
      background: linear-gradient(135deg, var(--purple), var(--cyan-2));
      vertical-align: 1px;
    }

    .stage-shell {
      overflow: hidden;
      position: relative;
      min-width: 0;
    }

    .stage-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 19px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(7, 21, 36, .58);
    }

    .stage-number { color: var(--cyan); font-size: 12px; font-weight: 900; }
    .stage-title { font-size: 23px; font-weight: 900; margin-top: 2px; letter-spacing: -.025em; }
    .stage-summary { color: var(--muted); margin-top: 4px; line-height: 1.48; font-size: 13px; }

    .stage-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }

    .stage-body {
      padding: 16px;
      transition: opacity .2s ease, transform .2s ease;
    }

    .stage-body.swapping { opacity: 0; transform: translateY(8px); }

    .io-grid {
      display: grid;
      grid-template-columns: minmax(0,1fr) 32px minmax(0,1fr);
      gap: 10px;
      align-items: stretch;
    }

    .flow-arrow {
      display: grid;
      place-items: center;
      color: var(--cyan);
      font-size: 26px;
      position: relative;
    }

    .flow-arrow::after {
      content: "";
      position: absolute;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 20px var(--cyan);
      animation: arrowMove 1.5s ease-in-out infinite;
    }

    @keyframes arrowMove {
      0%,100% { transform: translateX(-7px); opacity: .25; }
      50% { transform: translateX(7px); opacity: 1; }
    }

    .io-panel {
      min-width: 0;
      border-radius: 15px;
      border: 1px solid var(--line);
      background: rgba(4, 15, 27, .76);
      overflow: hidden;
    }

    .io-panel.output { border-color: rgba(45,212,191,.25); box-shadow: inset 0 0 40px rgba(45,212,191,.025); }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 11px 13px;
      border-bottom: 1px solid var(--line);
      color: #c4d2e2;
      font-size: 12px;
      font-weight: 850;
      background: rgba(255,255,255,.018);
    }

    .panel-badge {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(96,165,250,.1);
      color: #a8cfff;
      font-size: 10px;
      white-space: nowrap;
    }

    .panel-content {
      height: 430px;
      overflow: auto;
      padding: 12px;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.55;
      scrollbar-color: rgba(94,234,212,.3) transparent;
    }

    .log-group { margin-bottom: 12px; }
    .log-group-title { color: var(--purple); font-weight: 850; margin-bottom: 5px; }

    .logline {
      display: block;
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      color: #cbd8e7;
      background: rgba(255,255,255,.018);
      padding: 7px 9px;
      border-radius: 8px;
      margin: 4px 0;
      font-family: var(--mono);
      font-size: 10.5px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    button.logline { cursor: pointer; }
    button.logline:hover { border-color: rgba(45,212,191,.28); background: rgba(45,212,191,.05); }
    .logline.focused { border-color: rgba(251,191,36,.45); background: rgba(251,191,36,.07); box-shadow: inset 3px 0 0 var(--amber); }

    .tok-ts { color: #7dd3fc; }
    .tok-level-error { color: var(--red); font-weight: 900; }
    .tok-level-warn { color: var(--amber); font-weight: 900; }
    .tok-level-info { color: var(--green); font-weight: 900; }
    .tok-service { color: var(--purple); font-weight: 850; }
    .tok-dynamic { color: #fdba74; }
    .tok-mask { color: var(--cyan); font-weight: 900; }

    .json {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      color: #cbd8e7;
    }

    .diff-card, .explain-card, .trace-card, .graph-card, .chart-card {
      border: 1px solid var(--line);
      border-radius: 15px;
      background: rgba(7, 20, 34, .66);
    }

    .diff-card {
      margin-top: 12px;
      padding: 12px 13px;
      display: grid;
      grid-template-columns: auto minmax(0,1fr);
      gap: 10px;
      align-items: start;
    }

    .diff-icon {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: #05201b;
      background: var(--cyan);
      font-weight: 950;
    }

    .diff-title { font-size: 13px; font-weight: 900; }
    .diff-text { color: var(--muted); font-size: 12px; line-height: 1.55; margin-top: 3px; }

    .template-card, .annotation-card, .sample-card, .export-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 8px;
      background: rgba(255,255,255,.018);
      transition: border-color .16s ease, transform .16s ease;
    }

    .template-card.selected, .annotation-card.selected {
      border-color: rgba(45,212,191,.5);
      box-shadow: 0 0 0 1px rgba(45,212,191,.09), 0 12px 30px rgba(0,0,0,.18);
      transform: translateY(-1px);
    }

    .card-row { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    .card-title { color: #dbe8f5; font-weight: 850; }
    .card-sub { color: var(--muted); font-size: 10px; margin-top: 4px; }

    .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 4px 7px;
      color: #bcd0e3;
      background: rgba(148,163,184,.08);
      border: 1px solid rgba(148,163,184,.12);
      font-size: 9.5px;
      font-family: var(--sans);
    }

    .chip.error { color: #fecdd3; background: rgba(251,113,133,.09); border-color: rgba(251,113,133,.2); }
    .chip.availability { color: #bfdbfe; background: rgba(96,165,250,.09); border-color: rgba(96,165,250,.2); }
    .chip.saturation { color: #fde68a; background: rgba(251,191,36,.09); border-color: rgba(251,191,36,.2); }
    .chip.information { color: #bbf7d0; background: rgba(74,222,128,.08); border-color: rgba(74,222,128,.18); }

    .bar-chart {
      display: grid;
      grid-template-columns: repeat(3, minmax(95px, 1fr));
      gap: 20px;
      height: 300px;
      align-items: end;
      padding: 32px 18px 20px;
      background:
        linear-gradient(to top, rgba(148,163,184,.07) 1px, transparent 1px);
      background-size: 100% 20%;
      border-radius: 12px;
    }

    .bar-group { height: 100%; display: flex; flex-direction: column; justify-content: flex-end; }
    .bar-stack { flex: 1; display: flex; align-items: flex-end; justify-content: center; gap: 5px; }
    .bar {
      width: 18%;
      min-width: 12px;
      border-radius: 6px 6px 2px 2px;
      transform-origin: bottom;
      animation: growBar .7s cubic-bezier(.2,.8,.2,1) both;
      position: relative;
      box-shadow: 0 0 18px rgba(255,255,255,.05);
    }
    @keyframes growBar { from { transform: scaleY(.02); opacity: .2; } to { transform: scaleY(1); opacity: 1; } }
    .bar:hover::after {
      content: attr(data-tip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 7px);
      transform: translateX(-50%);
      background: #020a12;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 5px 7px;
      white-space: nowrap;
      color: var(--text);
      font-size: 9px;
      z-index: 4;
    }
    .bar-label { text-align: center; color: var(--muted); font-size: 10px; margin-top: 8px; }
    .legend { display: flex; flex-wrap: wrap; gap: 12px; padding: 10px 0 0; color: var(--muted); font-size: 10px; }
    .legend i { width: 8px; height: 8px; border-radius: 3px; display: inline-block; margin-right: 5px; }

    .causal-svg {
      width: 100%;
      min-width: 650px;
      height: 325px;
      display: block;
      background: radial-gradient(circle at center, rgba(45,212,191,.04), transparent 54%);
      border-radius: 12px;
    }

    .edge-line {
      stroke: rgba(45,212,191,.64);
      stroke-width: 2.4;
      stroke-dasharray: 7 7;
      animation: edgeFlow 1.2s linear infinite;
      filter: drop-shadow(0 0 5px rgba(45,212,191,.35));
    }
    @keyframes edgeFlow { to { stroke-dashoffset: -28; } }
    .edge-label { fill: #8ddbd1; font-size: 10px; font-family: var(--mono); }
    .node { cursor: pointer; }
    .node circle { fill: #0c2238; stroke: rgba(148,163,184,.38); stroke-width: 2; transition: all .18s ease; }
    .node:hover circle, .node.selected circle { stroke: var(--cyan); stroke-width: 3; filter: drop-shadow(0 0 12px rgba(45,212,191,.45)); }
    .node.root circle { stroke: var(--amber); }
    .node text { fill: #d9e7f5; font-size: 10px; font-family: var(--sans); pointer-events: none; }
    .node .node-sub { fill: #8299b3; font-size: 8px; }

    .inspector {
      padding: 16px;
      position: sticky;
      top: 14px;
      height: calc(100vh - 28px);
      min-height: 760px;
      overflow-y: auto;
    }

    .inspector-section {
      padding: 13px 0;
      border-bottom: 1px solid var(--line);
    }
    .inspector-section:last-child { border-bottom: 0; }
    .section-kicker { color: var(--cyan); font-size: 10px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; }
    .section-title { font-size: 14px; font-weight: 900; margin: 4px 0 8px; }
    .section-text { color: var(--muted); font-size: 12px; line-height: 1.62; }

    .path-box {
      font-family: var(--mono);
      font-size: 10px;
      line-height: 1.6;
      color: #b7c9db;
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 9px;
      background: rgba(0,0,0,.18);
      overflow-wrap: anywhere;
    }

    .event-row {
      display: grid;
      grid-template-columns: 12px minmax(0,1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 7px 0;
      color: #b9cada;
      font-size: 11px;
    }
    .event-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 12px rgba(45,212,191,.45); }
    .event-dot.done { background: var(--green); }
    .event-time { color: #6e87a1; font-family: var(--mono); font-size: 9px; }

    .mini-json {
      max-height: 180px;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      color: #a9bed1;
      font: 9.5px/1.55 var(--mono);
      background: rgba(0,0,0,.18);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px;
    }

    .progress-track {
      height: 8px;
      border-radius: 999px;
      background: rgba(148,163,184,.12);
      overflow: hidden;
      margin-top: 9px;
    }
    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      transition: width .45s cubic-bezier(.2,.8,.2,1);
      box-shadow: 0 0 18px rgba(45,212,191,.34);
    }

    .trace-card {
      margin-top: 15px;
      overflow: hidden;
    }

    .trace-head {
      display: grid;
      grid-template-columns: minmax(0,1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }
    .trace-head strong { display: block; }
    .trace-head span { color: var(--muted); font-size: 11px; }
    .trace-body {
      display: grid;
      grid-template-columns: 220px minmax(0,1fr);
      gap: 12px;
      padding: 14px;
    }
    .trace-meta { border-right: 1px solid var(--line); padding-right: 12px; }
    .trace-meta dt { color: var(--muted); font-size: 10px; }
    .trace-meta dd { margin: 2px 0 9px; font-size: 11px; font-family: var(--mono); overflow-wrap: anywhere; }
    .trace-content { font: 11px/1.65 var(--mono); color: #c7d7e7; white-space: pre-wrap; overflow-wrap: anywhere; }

    .footer {
      margin: 16px 0 4px;
      color: #7189a3;
      font-size: 11px;
      text-align: center;
      line-height: 1.5;
    }

    .pulse-ring {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      box-shadow: 0 0 0 0 rgba(74,222,128,.45);
      animation: livePulse 1.6s infinite;
    }
    @keyframes livePulse { 70% { box-shadow: 0 0 0 8px rgba(74,222,128,0); } 100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); } }

    @media (max-width: 1320px) {
      .workspace { grid-template-columns: 250px minmax(0,1fr); }

    orb.style.transform = `translateY(${y}px)`;

  function groupRawLogs() {

    }).join('');
  }

  function normalizedObject(log) {
    const requestMatch = log.message.match(/request_id=([^\s]+)/);
    return {
      log_id: log.id,
      file_path: log.file,
      line_number: log.line,
      timestamp: log.ts,
      timestamp_quality: 'parsed',
      level: log.level,
      service: log.service,
      parsed_fields: requestMatch ? {request_id:requestMatch[1],redaction_counts:{}} : {redaction_counts:{}},
      message: log.message,
      normalized_message: rawText(log).toLowerCase(),
      redacted_message: log.message
    };
  }

      case 'drain_templating':
        return chronological.map(l => `<button class="logline ${l.id===selectedTrace?'focused':''}" data-log="${l.id}"><span class="tok-service">${l.service}</span> · ${escapeHtml(rawText(l).toLowerCase())}</button>`).join('');
      case 'representative_sampling':
        return Object.entries(templates).map(([id,item]) => `<div class="template-card ${id===selectedTemplate?'selected':''}"><div class="card-row"><span class="card-title">${id} · ${escapeHtml(L(item.name))}</span><span class="panel-badge">${item.count} ${L(UI.linesUnit)}</span></div><div class="card-sub">${escapeHtml(item.text)}</div></div>`).join('');

      }

        })}</pre>`;

  function causalGraphSvg() {
    const positions = {T1:[90,90],T2:[275,90],T3:[275,245],T4:[480,165],T6:[690,165]};
    const label = id => lang==='zh'
      ? templates[id].name.zh.replace('连接池','池').replace('Checkout','CO')
      : templates[id].name.en.replace('exhausted','exh.').replace('failure','fail');
    const lines = edgeData.map(e => {
      const [x1,y1]=positions[e.source], [x2,y2]=positions[e.target];
      const mx=(x1+x2)/2, my=(y1+y2)/2-8;
      return `<line class="edge-line" x1="${x1+43}" y1="${y1}" x2="${x2-43}" y2="${y2}" marker-end="url(#arrow)"/><text class="edge-label" x="${mx}" y="${my}" text-anchor="middle">${e.confidence.toFixed(2)} · ${e.lag}s</text>`;
    }).join('');
    const nodes = Object.entries(positions).map(([id,[x,y]]) => `<g class="node ${id==='T1'?'root':''} ${id===selectedTemplate?'selected':''}" data-template="${id}"><circle cx="${x}" cy="${y}" r="43"/><text x="${x}" y="${y-4}" text-anchor="middle">${id}</text><text class="node-sub" x="${x}" y="${y+12}" text-anchor="middle">${escapeHtml(label(id).slice(0,16))}</text></g>`).join('');
    return `<svg class="causal-svg" viewBox="0 0 780 330" role="img" aria-label="${escapeHtml(L(UI.svgAria))}"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#2dd4bf"/></marker></defs>${lines}${nodes}</svg>`;
  }

  function temporalChart() {
    const rows = [
      {label:'10:11', information:0, saturation:2, availability:1, error:0},
      {label:'10:12', information:1, saturation:0, availability:2, error:1},
      {label:'10:13', information:0, saturation:0, availability:1, error:1}
    ];
    const colors = {information:'#4ade80',saturation:'#fbbf24',availability:'#60a5fa',error:'#fb7185'};
    return `<div class="bar-chart">${rows.map((r,idx)=>`<div class="bar-group"><div class="bar-stack">${Object.keys(colors).map(key=>`<div class="bar" data-tip="${key}: ${r[key]}" style="height:${Math.max(4,r[key]*32)}%;background:${colors[key]};animation-delay:${idx*.08}s"></div>`).join('')}</div><div class="bar-label">${r.label}:00</div></div>`).join('')}</div><div class="legend">${Object.entries(colors).map(([k,c])=>`<span><i style="background:${c}"></i>${k}</span>`).join('')}</div>`;
  }

  function summaryNarrative() {
    if (lang === 'zh') {
      return `<div style="font-family:var(--sans);line-height:1.65"><h3 style="margin-top:0">Incident Diagnosis Summary</h3><p><strong>候选根因：</strong>证据表明 <code>auth-service</code> 的数据库连接池耗尽可能是较早的贡献信号，并在获取数据库连接失败之后，领先于 <code>payment-service</code> 调用超时以及 Gateway 500 症状。</p><p><strong>候选链：</strong><br>Auth pool exhausted → Auth DB acquire failure → Payment timeout → Gateway 500。</p><p><strong>不确定性：</strong>该结果需要结合指标、Trace、部署变更和时钟偏差继续验证，不能视为已经证明的最终 RCA。</p><p><strong>下一步：</strong>检查 Auth DB Pool 指标、连接等待时长、Payment 到 Auth 的 Trace，以及 10:11:30 前后的变更。</p><div class="chips"><span class="chip">evidence_refs: auth-1</span><span class="chip">auth-2</span><span class="chip">payment-2</span><span class="chip">gateway-2</span></div></div>`;
    }
    return `<div style="font-family:var(--sans);line-height:1.65"><h3 style="margin-top:0">Incident Diagnosis Summary</h3><p><strong>Candidate root cause:</strong> Evidence suggests that database connection-pool exhaustion in <code>auth-service</code> may be an early contributing signal, followed by failed DB-connection acquisitions and preceding the <code>payment-service</code> call timeouts and the gateway 500 symptoms.</p><p><strong>Candidate chain:</strong><br>Auth pool exhausted → Auth DB acquire failure → Payment timeout → Gateway 500.</p><p><strong>Uncertainty:</strong> This needs validation with metrics, traces, deployment changes, and clock-skew checks — it must not be treated as a proven final RCA.</p><p><strong>Next steps:</strong> Check auth DB pool metrics, connection wait times, payment→auth traces, and any changes around 10:11:30.</p><div class="chips"><span class="chip">evidence_refs: auth-1</span><span class="chip">auth-2</span><span class="chip">payment-2</span><span class="chip">gateway-2</span></div></div>`;
  }

      representative_sampling:[{en:'Template groups',zh:'模板分组'},'RepresentativeSample','6 clusters','6 samples'],
      ai_platform_annotation:[{en:'Model payload',zh:'模型 Payload'},'TemplateAnnotation','1 selected payload','6 annotations'],
      broadcast_annotations:[{en:'Template annotations',zh:'模板级标注'},{en:'Per-line enriched logs',zh:'逐行 enriched logs'},'6 annotations','9 annotated lines'],
      temporal_aggregation:[{en:'Semantically enriched lines',zh:'带语义的日志行'},'WindowAggregate + Temporal View','9 lines','17 aggregate rows'],
      causal_graph:[{en:'Template time series & entity links',zh:'模板时间序列与实体关系'},{en:'Candidate causal graph',zh:'Candidate Causal Graph'},'5 series','5 nodes · 3 edges'],
      causal_summary:[{en:'Safe evidence packet',zh:'安全 Evidence Packet'},'CausalSummary','5 refs · 3 edges','RCA + actions'],
      export_artifacts:['AnalysisResult','ExportArtifact','1 result','3 exports']
    };
    return map[stage.id].map(L);
  }

  function diff(stage) {
    const map = {
      ingest_paths:[{en:'Evidence identity established',zh:'建立证据身份'},{en:'The text is not parsed yet, but every file and physical line now has an auditable id, hash, order, and origin.',zh:'文本尚未被解析，但每个文件与物理行现在拥有可审计的 ID、Hash、顺序和来源。'}],
      merge_entries:[{en:'Physical lines → logical events',zh:'物理行 → 逻辑事件'},{en:'This sample has single-line logs only, so counts stay equal; a Java stack trace would collapse into one LogEntry that keeps all its line numbers.',zh:'示例日志都是单行，因此数量不变；如果是 Java Stack Trace，多行会合成一个 LogEntry 并保留全部行号。'}],
      preprocess_redact:[{en:'Unstructured text → safe structured records',zh:'无结构文本 → 安全结构化记录'},{en:'Adds timestamp, level, service, request_id and more; sensitive values are masked before anything reaches templating or the model.',zh:'新增 timestamp、level、service、request_id 等字段；敏感值先被屏蔽，之后才允许进入模板与模型阶段。'}],
      drain_templating:[{en:'9 lines → 6 structural patterns',zh:'9 行 → 6 个结构模式'},{en:'Dynamic values become <*>; logs with identical structure collapse into one template_id.',zh:'动态值统一为 <*>，同结构日志被压缩到同一 template_id。'}],
      representative_sampling:[{en:'Template groups → a few explainable samples',zh:'模板组 → 少量可解释样本'},{en:'Each template keeps only the necessary representatives, shrinking model calls from per-line to per-template.',zh:'每个模板只保留必要代表，模型调用规模从逐行降为逐模板。'}],
      ai_platform_annotation:[{en:'Text templates → semantic labels',zh:'文本模板 → 语义标签'},{en:'Templates now carry a golden signal, fault categories, entities, severity, confidence, and a rationale.',zh:'模板现在具有 Golden Signal、故障类别、实体、严重度、置信度和 rationale。'}],
      broadcast_annotations:[{en:'Template semantics → every evidence line',zh:'模板语义 → 每一条 Evidence'},{en:'All lines of a template inherit its semantics while keeping their own request_id / trace_id.',zh:'所有同模板日志继承语义，同时保留自己独有的 request_id / trace_id。'}],
      temporal_aggregation:[{en:'Discrete events → evolution over time',zh:'离散事件 → 时间演化趋势'},{en:'You can now see the 10:11 resource pressure leading the 10:12/10:13 timeouts and 500s.',zh:'现在可以观察 10:11 的资源压力如何领先于 10:12/10:13 的超时和 500。'}],
      causal_graph:[{en:'Correlated events → evidence-backed candidate chain',zh:'相关事件 → 带证据的候选链'},{en:'Multiple statistical and structural signals are fused; edges are explicit candidates that need external telemetry to validate.',zh:'融合多个统计与结构信号；边被明确标记为候选，需要外部 Telemetry 验证。'}],
      causal_summary:[{en:'Structured graph → human-readable RCA',zh:'结构化图 → 人可读 RCA'},{en:'The narrative must cite the provided evidence_refs; if the model is unavailable or invalid, a deterministic fallback renders instead.',zh:'叙述必须引用提供的 evidence_refs；模型不可用或输出无效时自动使用确定性 Fallback。'}],
      export_artifacts:[{en:'In-memory result → deliverable reports',zh:'分析内存对象 → 可交付报告'},{en:'The same result can flow into Markdown, HTML, JSON, tickets, customer updates, or other systems.',zh:'同一结果可进入 Markdown、HTML、JSON、工单、客户更新或其他系统。'}]
    };
    return map[stage.id].map(L);
  }

  function traceState(stage) {
    const l = traceLog();
    const t = templates[l.template];
    const en = lang === 'en';
    const base = {file:l.file,line:l.line,log_id:l.id,timestamp:l.ts,template:l.template};
    const states = {
      ingest_paths:`RawPhysicalLine\nraw_text = ${rawText(l)}\nsha256 = sha256(raw_text)\ningestion_order = ${l.order}`,
      merge_entries:`LogEntry\nline_numbers = [${l.line}]\nraw_message = ${rawText(l)}\nraw_line_ids = [raw-${l.id}]`,
      preprocess_redact:`NormalizedLogLine\ntimestamp = ${l.ts} (parsed)\nlevel = ${l.level}\nservice = ${l.service}\nredacted_message = ${l.message}\nparsed_fields = ${JSON.stringify(l.message.includes('request_id')?{request_id:(l.message.match(/request_id=([^\s]+)/)||[])[1]}:{})}`,
      drain_templating:`template_id = ${l.template}\ntemplate_text = ${t.text}\noccurrence_count = ${t.count}`,
      representative_sampling:`RepresentativeSample\nsample_reason = earliest\nsample_rank = 0\nmessage = ${l.message}\nevidence_ref = ${l.file}:${l.line}`,
      ai_platform_annotation:`TemplateAnnotation\ngolden_signal = ${t.golden}\nfault_categories = ${JSON.stringify(t.faults)}\nentities = ${JSON.stringify(t.entities)}\nseverity = ${t.severity}\nconfidence = ${t.confidence}`,
      broadcast_annotations:`Enriched NormalizedLogLine\n${l.id} ${en?'now inherits template':'现在继承模板'} ${l.template}\ngolden_signal = ${t.golden}\nfault_categories = ${JSON.stringify(t.faults)}\n${en?'request/trace/thread entities remain line-specific':'request/trace/thread 实体仍是行级独有'}`,
      temporal_aggregation:`WindowAggregate contribution\nwindow_start = ${l.ts.slice(0,16)}:00Z\nservice = ${l.service}\ngolden_signal = ${t.golden}\ncount += 1`,
      causal_graph:`Evidence role\nnode = ${l.template} (${L(t.name)})\n${l.template==='T6'?(en?'This is a downstream symptom node.\nIncoming candidate edge: T4 → T6.':'这是下游症状节点。\n候选入边：T4 → T6。'):(en?'This template participates in candidate causal ranking.':'该模板参与候选因果排序。')}\nneeds_validation = true`,
      causal_summary:`EvidenceRef cited by summary\nlog_id = ${l.id}\nfile_path = ${l.file}\nline_number = ${l.line}\n${en?'a claim must reference this id before it is accepted':'声明必须引用该 id 才会被接受'}`,
      export_artifacts:`Export traceability\n${en?'JSON/Markdown/HTML keeps the redacted finding and evidence reference:':'JSON/Markdown/HTML 保留脱敏结论与证据引用：'}\n${l.file}:${l.line} · ${l.id}`
    };
    return {base,text:states[stage.id]};
  }

  function bindDynamicElements() {
    document.querySelectorAll('[data-log]').forEach(el => el.addEventListener('click', () => {
      selectedTrace = el.dataset.log;
      $('traceSelect').value = selectedTrace;
      renderStage(false);
    }));
    document.querySelectorAll('[data-template-card]').forEach(el => el.addEventListener('click', () => {
      selectedTemplate = el.dataset.templateCard;
      $('templateSelect').value = selectedTemplate;
      renderStage(false);
    }));
    document.querySelectorAll('.node[data-template]').forEach(el => el.addEventListener('click', () => {
      selectedTemplate = el.dataset.template;
      $('templateSelect').value = selectedTemplate;
      renderStage(false);
    }));
  }

  function renderInspector(stage) {
    $('whyText').textContent = L(stage.why);
    $('codePath').innerHTML = `<strong>${escapeHtml(stage.file)}</strong><br>${escapeHtml(stage.fn)}`;
    $('codeSnippet').textContent = stage.snippet;
    $('contractText').innerHTML = `<strong>${L(UI.contractIn)}</strong><code>${escapeHtml(stage.inType)}</code><br><strong>${L(UI.contractOut)}</strong><code>${escapeHtml(stage.outType)}</code>`;
    $('eventTimeline').innerHTML = `
      <div class="event-row"><span class="event-dot"></span><span>${stage.id} · started</span><span class="event-time">+0ms</span></div>
      <div class="event-row"><span class="event-dot done"></span><span>${stage.id} · completed</span><span class="event-time">+${stage.duration}${L(UI.demoMs)}</span></div>
      <div class="event-row"><span class="event-dot done"></span><span>${L(UI.promObserved)}</span><span class="event-time">count-only</span></div>`;
    $('metadataBox').textContent = JSON.stringify({step_name:stage.id,event_type:'completed',status:'completed',attempt:1,idempotency_key:`${stage.id}:attempt:1`,metadata:stage.metadata},null,2);
  }

  function renderTrace(stage) {
    const {base,text} = traceState(stage);
    $('traceMeta').innerHTML = `<dt>${L(UI.metaSelected)}</dt><dd>${escapeHtml(base.log_id)}</dd><dt>${L(UI.metaSource)}</dt><dd>${escapeHtml(base.file)}:${base.line}</dd><dt>${L(UI.metaTimestamp)}</dt><dd>${escapeHtml(base.timestamp)}</dd><dt>${L(UI.metaTemplate)}</dt><dd>${escapeHtml(base.template)}</dd>`;
    $('traceContent').textContent = text;
  }

  function renderStage(animate=true) {
    const stage = stageDefs[activeStage];
    const body = $('stageBody');
    if (animate) body.classList.add('swapping');
    window.setTimeout(() => {
      $('stageNumber').textContent = `STEP ${String(activeStage+1).padStart(2,'0')} / ${stageDefs.length}` + (stage.llm ? ` · ${L(UI.llmStep)}` : '');
      $('stageTitle').textContent = L(stage.title);
      $('stageSummary').textContent = L(stage.summary);
      const [it,ot,ib,ob] = titles(stage);
      $('inputTitle').textContent = it; $('outputTitle').textContent = ot; $('inputBadge').textContent = ib; $('outputBadge').textContent = ob;
      $('inputPanel').innerHTML = renderInput(stage);
      $('outputPanel').innerHTML = renderOutput(stage);
      const [dt,dx] = diff(stage); $('diffTitle').textContent = dt; $('diffText').textContent = dx;
      renderInspector(stage);
      renderTrace(stage);
      renderRail();
      $('railStatus').textContent = L(UI.stepOf)(activeStage+1, stageDefs.length);
      $('progressFill').style.width = `${((activeStage+1)/stageDefs.length)*100}%`;
      bindDynamicElements();
      body.classList.remove('swapping');
    }, animate ? 160 : 0);
  }

  function setStage(index) {
    activeStage = Math.max(0, Math.min(stageDefs.length-1,index));
    renderStage(true);
  }

  function nextStage() {
    if (activeStage >= stageDefs.length-1) { stopPlay(); return; }
    setStage(activeStage+1);
  }
  function prevStage() { setStage(activeStage-1); }

  function startPlay() {
    if (timer) { stopPlay(); return; }
    $('playBtn').textContent = L(UI.pause);
    if (activeStage >= stageDefs.length-1) setStage(0);
    timer = window.setInterval(nextStage, Number($('speedSelect').value));
  }
  function stopPlay() { if (timer) window.clearInterval(timer); timer=null; $('playBtn').textContent=L(UI.play); }

  function setLang(next) {
    lang = next;
    try { localStorage.setItem('logan:explorer-lang', lang); } catch {}
    renderChrome();
    renderMetrics();
    renderSelectors();
    renderStage(false);
  }

  $('langBtn').addEventListener('click', () => setLang(lang === 'en' ? 'zh' : 'en'));
  $('prevBtn').addEventListener('click', () => { stopPlay(); prevStage(); });
  $('nextBtn').addEventListener('click', () => { stopPlay(); nextStage(); });
  $('playBtn').addEventListener('click', startPlay);
  $('speedSelect').addEventListener('change', () => { if (timer) { stopPlay(); startPlay(); } });
  $('resetBtn').addEventListener('click', () => { stopPlay(); activeStage=0; selectedTemplate='T6'; selectedTrace='gateway-2'; renderSelectors(); renderStage(true); });
  $('templateSelect').addEventListener('change', e => { selectedTemplate=e.target.value; renderStage(false); });
  $('traceSelect').addEventListener('change', e => { selectedTrace=e.target.value; renderStage(false); });
  $('copyBtn').addEventListener('click', async () => {
    const text = $('outputPanel').innerText;
    try { await navigator.clipboard.writeText(text); $('copyBtn').textContent=L(UI.copied); setTimeout(()=>$('copyBtn').textContent=L(UI.copy),1200); }
    catch { window.prompt(L(UI.copyPrompt), text); }
  });
  window.addEventListener('resize', positionOrb);
  window.addEventListener('keydown', e => {
    if (e.target && e.target.closest && e.target.closest('button, select, input, textarea, a')) return;
    if (e.key === 'ArrowRight') { stopPlay(); nextStage(); }
    if (e.key === 'ArrowLeft') { stopPlay(); prevStage(); }
    if (e.key === ' ') { e.preventDefault(); startPlay(); }
  });

  renderChrome();
  renderMetrics();
  renderSelectors();
  renderStage(false);
})();
</script>
</body>
</html>
