apiVersion: apps/v1
kind: Deployment
metadata:
  name: logan-worker
  namespace: logan
spec:
  replicas: 2
  selector:
    matchLabels:
      app: logan-worker
  template:
    metadata:
      labels:
        app: logan-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/itwake/logan-worker:latest
          command: ["python", "-m", "logan_workers.temporal_worker"]
          envFrom:
            - configMapRef:
                name: logan-config
            - secretRef:
                name: logan-secrets
          startupProbe:
            exec:
              command: ["python", "-m", "logan_workers.healthcheck", "--timeout", "3"]
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            exec:
              command: ["python", "-m", "logan_workers.healthcheck", "--timeout", "3"]
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["python", "-m", "logan_workers.healthcheck", "--timeout", "3"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
