apiVersion: batch/v1
kind: Job
metadata:
  name: logan-migration
  namespace: logan
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ghcr.io/itwake/logan-api:latest
          command: ["alembic", "upgrade", "head"]
          workingDir: /app/apps/api
          envFrom:
            - configMapRef:
                name: logan-config
            - secretRef:
                name: logan-secrets
