apiVersion: apps/v1
kind: Deployment
metadata:
  name: logan-api
  namespace: logan
spec:
  replicas: 2
  selector:
    matchLabels:
      app: logan-api
  template:
    metadata:
      labels:
        app: logan-api
    spec:
      containers:
        - name: api
          image: ghcr.io/itwake/logan-api:latest
          envFrom:
            - configMapRef:
                name: logan-config
            - secretRef:
                name: logan-secrets
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/capabilities
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: logan-api
  namespace: logan
spec:
  selector:
    app: logan-api
  ports:
    - port: 8000
      targetPort: 8000
