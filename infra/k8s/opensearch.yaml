apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch
  namespace: logan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:latest
          env:
            - name: discovery.type
              value: single-node
            - name: plugins.security.disabled
              value: "true"
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: logan-secrets
                  key: LOGAN_SECRET_KEY
          ports:
            - containerPort: 9200
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: logan
spec:
  selector:
    app: opensearch
  ports:
    - port: 9200
      targetPort: 9200
