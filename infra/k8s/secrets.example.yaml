apiVersion: v1
kind: Secret
metadata:
  name: logan-secrets
  namespace: logan
type: Opaque
stringData:
  LOGAN_SECRET_KEY: "replace-me"
  LOGAN_CREDENTIAL_ENCRYPTION_KEY: "replace-me"
  LOGAN_DATABASE_URL: "postgresql+psycopg://logan:logan@postgres:5432/logan"
  LOGAN_REDIS_URL: "redis://redis:6379/0"
  LOGAN_S3_ACCESS_KEY: "logan"
  LOGAN_S3_SECRET_KEY: "replace-me"
  LOGAN_AI_PLATFORM_CHAT_HOST: "https://ai-platform.example.com"
  LOGAN_AI_PLATFORM_IB2B_HOST: "https://ai-platform.example.com"
  LOGAN_AI_PLATFORM_USERNAME: "replace-me"
  LOGAN_AI_PLATFORM_PASSWORD: "replace-me"
  LOGAN_AI_PLATFORM_USERCASE: "replace-me"
  LOGAN_AI_PLATFORM_TOKEN: ""
