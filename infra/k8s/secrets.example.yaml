apiVersion: v1
kind: Secret
metadata:
  name: logan-secrets
  namespace: logan
type: Opaque
stringData:
  LOGAN_SECRET_KEY: "replace-me"
  LOGAN_CREDENTIAL_ENCRYPTION_KEY: "replace-me"
  LOGAN_DATABASE_URL: "postgresql+asyncpg://logan:logan@postgres:5432/logan"
  LOGAN_REDIS_URL: "redis://redis:6379/0"
  LOGAN_S3_ACCESS_KEY: "logan"
  LOGAN_S3_SECRET_KEY: "replace-me"
