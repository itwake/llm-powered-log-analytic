name: ci

on:
  pull_request:
  push:
    branches:
      - codex/logan-platform-foundation
  workflow_dispatch:
    inputs:
      run_copilot_staging:
        description: "Run real Copilot staging smoke when secrets are configured"
        required: false
        default: "false"

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest ruff
      - name: Ruff
        run: ruff check apps tests scripts
      - name: Pytest
        run: python -m pytest -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate
      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
      - name: Build web
        run: pnpm --filter @logan/web build
      - name: Typecheck web
        run: pnpm --filter @logan/web test

  full-stack-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Full stack smoke
        run: docker compose --profile smoke run --rm -T --build smoke
      - name: Compose logs on failure
        if: failure()
        run: docker compose logs --no-color api worker postgres minio clickhouse opensearch temporal || true
      - name: Tear down
        if: always()
        run: docker compose down --remove-orphans -v

  copilot-staging-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_copilot_staging == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
      - name: Copilot staging smoke
        env:
          LOGAN_RUN_COPILOT_STAGING_SMOKE: "true"
          LOGAN_GITHUB_COPILOT_TOKEN: ${{ secrets.LOGAN_GITHUB_COPILOT_TOKEN }}
          LOGAN_GITHUB_SOURCE_TOKEN: ${{ secrets.LOGAN_GITHUB_SOURCE_TOKEN }}
        run: python -m pytest -q tests/staging/test_copilot_smoke.py
