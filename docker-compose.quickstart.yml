# Quick local Docker stack: API + web only, no external services.
#
#   docker compose -f docker-compose.quickstart.yml up --build -d
#   open http://localhost:3000 and sign in with "Continue with SSO"
#   docker compose -f docker-compose.quickstart.yml down
#
# The API uses SQLite metadata and the local object store on the
# logan-quickstart-data volume, the deterministic mock LLM provider, and mock
# SSO sign-in. Case data survives restarts; remove it with `down -v`.
# For PostgreSQL, MinIO, Temporal, ClickHouse, and OpenSearch use the
# full-stack docker-compose.yml instead.
name: logan-quickstart

services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      LOGAN_ENV: development
      LOGAN_LLM_PROVIDER: mock
      LOGAN_STORE_BACKEND: auto
      LOGAN_DATABASE_URL: sqlite:////data/logan.db
      LOGAN_OBJECT_STORE_BACKEND: local
      LOGAN_LOCAL_OBJECT_STORE_DIR: /data/object-store
      LOGAN_ANALYSIS_INPUT_TMP_DIR: /tmp/logan-analysis-inputs
      LOGAN_ANALYSIS_ORCHESTRATOR: local
      LOGAN_SSO_ENABLED: "true"
      LOGAN_SSO_MOCK_ENABLED: "true"
      LOGAN_SSO_AUTHORIZE_URL: http://localhost:8000/api/auth/sso/mock/authorize
      LOGAN_SSO_TOKEN_URL: http://localhost:8000/api/auth/sso/mock/token
      LOGAN_SSO_MOCK_USERNAME: logan.local
      LOGAN_SSO_MOCK_EMAIL: logan.local@example.com
      LOGAN_SSO_MOCK_FULL_NAME: Logan Local User
      LOGAN_CORS_ALLOWED_ORIGINS: http://localhost:3000
      LOGAN_WEB_BASE_URL: http://localhost:3000
      PYTHONUNBUFFERED: "1"
    volumes:
      - logan-quickstart-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).read()\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        # Inlined into the client bundle at build time; the browser calls the
        # API on its published host port.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 15s

volumes:
  logan-quickstart-data:
